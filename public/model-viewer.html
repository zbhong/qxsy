<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Model Viewer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://unpkg.com/@react-three/fiber@8.17.10/dist/index.umd.js"></script>
  <script src="https://unpkg.com/@react-three/drei@9.114.5/dist/index.umd.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }
    #root {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { Canvas } = ReactThreeFiber;
    const { OrbitControls, PerspectiveCamera, Environment, useGLTF } = ReactThreeDrei;

    function Model({ url }) {
      const { scene } = useGLTF(url);
      return React.createElement(ReactThreeFiber.primitive, { object: scene });
    }

    function ModelViewer() {
      // 从URL参数中获取模型URL
      const urlParams = new URLSearchParams(window.location.search);
      const modelUrl = urlParams.get('model');

      if (!modelUrl) {
        return React.createElement('div', {
          style: {
            width: '100%',
            height: '100%',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            backgroundColor: '#f3f4f6'
          }
        }, '请先上传3D模型');
      }

      return React.createElement(Canvas, { camera: { position: [0, 0, 5] } },
        React.createElement(PerspectiveCamera, { makeDefault: true, fov: 75, position: [0, 2, 5] }),
        React.createElement('ambientLight', { intensity: 0.5 }),
        React.createElement('directionalLight', { position: [10, 10, 5], intensity: 1 }),
        React.createElement(React.Suspense, { fallback: 
          React.createElement('div', {
            style: {
              width: '100%',
              height: '100%',
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'center'
            }
          }, '加载模型中...')
        },
          React.createElement(Model, { url: modelUrl }),
          React.createElement(Environment, { preset: 'studio' })
        ),
        React.createElement(OrbitControls, {
          enableDamping: true,
          dampingFactor: 0.1,
          enableZoom: true,
          enablePan: true
        })
      );
    }

    ReactDOM.render(
      React.createElement(ModelViewer),
      document.getElementById('root')
    );
  </script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
